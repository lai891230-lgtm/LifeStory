<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeStory</title>
  <!-- App Styling -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles_battery_final.css">
  <link rel="stylesheet" href="styles_multitrack.css">

  <!-- PWA Manifest & Icons -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#fdfbf7">
  <link rel="apple-touch-icon" href="./icon-192.png">
</head>

<body>
  <div class="app-container">


    <header>
      <h1>Life Timeline</h1>
      <div class="subtitle">A Journey of 900 Months</div>

      <!-- Filter & Settings Buttons -->
      <div style="position: absolute; top: 20px; right: 24px; display: flex; gap: 15px; z-index: 50;">
        <button class="icon-btn" id="btn-time-capsule" title="歲月流轉">🕰️</button>
        <button class="icon-btn" id="btn-open-multitrack" title="多軌道視圖">📊</button>
        <button class="icon-btn" id="btn-open-filter" title="篩選與分類">🏷️</button>
        <button class="icon-btn" id="btn-settings" title="設定">☰</button>
      </div>

      <!-- Life Battery (Horizontal Progress) -->
      <div id="life-battery-container" class="life-battery-container">
        <!-- 1. Background Track (Future) with Masking -->
        <div class="battery-track">
          <!-- 2. Filled Progress (Past) -->
          <div id="battery-fill" class="battery-fill"></div>
          <!-- 3. Current View Needle -->
          <div id="battery-needle" class="battery-needle"></div>
        </div>

        <!-- 4. Hover/Drag Label -->
        <div id="battery-label" class="battery-label"></div>
      </div>
    </header>

    <!-- Search Bar -->
    <div class="search-container-main">
      <input type="text" id="inp-search" class="search-input-main" placeholder="🔍 搜尋回憶...">
    </div>

    <!-- Timeline Container (Infinite Scroll) -->
    <div class="timeline-list-container" id="timeline-list-container">
      <div class="timeline-line"></div>
      <div id="timeline-list">
        <!-- All events injected here -->
      </div>
    </div>

    <!-- Full Screen Filtered View (Hidden by default) -->
    <div class="full-screen-list-view" id="full-screen-list-view">
      <div class="list-view-header">
        <button id="btn-close-list-view" class="btn-icon">←</button>
        <span id="list-view-title">分類列表</span>
      </div>
      <div class="list-view-content" id="list-view-content">
        <!-- Filtered events injected here -->
      </div>
    </div>

    <!-- Multi-track View (Hidden by default) -->
    <div class="full-screen-list-view" id="multi-track-view" style="background:#fefefe;">
      <div class="list-view-header">
        <button id="btn-close-multitrack" class="btn-icon">←</button>
        <span id="multitrack-title">人生軌道看版</span>
      </div>

      <!-- NEW: Track toggles area -->
      <div id="multitrack-controls" class="multitrack-controls">
        <!-- Toggles injected here -->
      </div>

      <div class="multitrack-container" id="multitrack-content">
        <!-- Tracks injected here -->
      </div>
    </div>

    <button class="fab" id="fab-add">+</button>
  </div>

  <!-- Filter & Order Modal -->
  <div class="modal-overlay" id="modal-filter">
    <div class="modal-content">
      <div class="modal-header">
        <span>分類管理與篩選</span>
        <span style="font-size:1.5rem; cursor:pointer" id="modal-filter-close">&times;</span>
      </div>

      <!-- Moved Add Tag Here -->
      <div class="settings-section" style="margin-bottom:20px; padding-bottom:15px; border-bottom:1px solid #eee;">
        <h3 style="margin-top:0;">✨ 新增分類</h3>
        <div class="form-row">
          <input type="text" id="inp-new-tag-name" placeholder="名稱">
          <input type="color" id="inp-new-tag-color" value="#e0e0e0" style="width:40px; padding:2px;">
          <button class="btn-small" id="btn-add-tag">新增</button>
        </div>
      </div>

      <p style="font-size:0.8rem; color:#888; margin-bottom:10px;">
        點擊標籤可進行篩選。<br>
        長按並拖曳即可調整順序。
      </p>

      <div id="filter-list-container" class="filter-list-container">
        <!-- Generated by JS -->
      </div>
    </div>
  </div>

  <!-- Add/Edit Event Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span id="modal-title">記錄一刻</span>
        <span style="font-size:1.5rem; cursor:pointer" id="modal-close">&times;</span>
      </div>
      <form id="form-add">
        <input type="hidden" id="inp-id">

        <div class="form-group">
          <label>開始日期 / 發生日期</label>
          <div class="hybrid-date-wrapper">
            <input type="text" id="inp-date" placeholder="YYYY-MM-DD (如 2015-05-20)" pattern="\d{4}-\d{2}-\d{2}"
              inputmode="numeric" required autocomplete="off">
            <div class="picker-container">
              <span>📅</span>
              <input type="date" tabindex="-1" onchange="document.getElementById('inp-date').value = this.value">
            </div>
          </div>
          <div class="checkbox-group" style="margin-top: 0.5rem;">
            <input type="checkbox" id="inp-is-period">
            <label for="inp-is-period">這是一個時間段 (設定結束日期)</label>
          </div>
          <div class="checkbox-group" style="margin-top: 0.25rem;">
            <input type="checkbox" id="inp-no-day">
            <label for="inp-no-day">只到月份</label>
          </div>
        </div>

        <div class="form-group" id="group-end-date" style="display:none; margin-top: 0.5rem;">
          <label>結束日期</label>
          <div class="hybrid-date-wrapper">
            <input type="text" id="inp-end-date" placeholder="YYYY-MM-DD (如 2015-05-20)" pattern="\d{4}-\d{2}-\d{2}"
              inputmode="numeric" autocomplete="off">
            <div class="picker-container">
              <span>📅</span>
              <input type="date" tabindex="-1" onchange="document.getElementById('inp-end-date').value = this.value">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>分類標籤</label>
          <select id="inp-tag">
            <!-- Options generated by JS -->
          </select>
        </div>

        <div class="form-group">
          <label>標題</label>
          <input type="text" id="inp-title" placeholder="發生了什麼？" required>
        </div>

        <div class="form-group">
          <label>詳細內容 (日記)</label>
          <textarea id="inp-desc" rows="4" placeholder="當時的感受..."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-delete" id="btn-delete" style="display:none">刪除</button>
          <button type="submit" class="btn-primary" id="btn-submit">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Settings Modal (Removed Filter Section) -->
  <div class="modal-overlay" id="modal-settings">
    <div class="modal-content">
      <div class="modal-header">
        <span>設定與功能</span>
        <span style="font-size:1.5rem; cursor:pointer" id="modal-settings-close">&times;</span>
      </div>

      <div class="settings-section">
        <h3>👤 個人設定</h3>
        <div class="form-group">
          <label>出生年月日</label>
          <div class="hybrid-date-wrapper">
            <input type="text" id="inp-settings-birthdate" placeholder="YYYY-MM-DD" pattern="\d{4}-\d{2}-\d{2}"
              inputmode="numeric" autocomplete="off">
            <div class="picker-container">
              <span>📅</span>
              <input type="date" tabindex="-1"
                onchange="document.getElementById('inp-settings-birthdate').value = this.value">
            </div>
          </div>
          <button class="btn-secondary" id="btn-save-birthdate" style="margin-top:8px; width:100%">更新生日</button>
        </div>
      </div>

      <div class="settings-section">
        <h3>🎨 外觀設定</h3>
        <button class="btn-secondary" id="btn-toggle-theme"
          style="width:100%; font-size: 1rem; padding: 12px; margin-bottom: 10px;">切換深色/淺色模式 🌗</button>
      </div>

      <div class="settings-section">
        <h3>💾 資料備份與管理</h3>
        <div class="data-backup-row">
          <button class="btn-primary" id="btn-export">匯出資料</button>
          <button class="btn-secondary" id="btn-import-trigger">匯入資料</button>
          <input type="file" id="file-import" style="display:none" accept=".json">
        </div>
        <button class="btn-danger-block" id="btn-reset-data">⚠️ 刪除所有資料 (重置帳號)</button>
      </div>

      <div class="version-info" style="text-align:center; margin-top:30px; color:#aaa; font-size:0.8rem;">
        Life Timeline v1.2
      </div>
    </div>
  </div>

  <!-- Onboarding Modal (Force Input) -->
  <div class="modal-overlay" id="modal-onboarding" style="z-index: 300;">
    <div class="modal-content" style="text-align:center;">
      <div class="modal-header" style="justify-content:center;">
        <span>歡迎來到 Life Timeline</span>
      </div>
      <p style="color:var(--ink-secondary); margin-bottom:24px;">
        為了建立您的人生進度條，<br>請輸入您的出生年月日。
      </p>

      <div class="form-group">
        <label style="text-align:left;">出生日期</label>
        <div class="hybrid-date-wrapper">
          <input type="text" id="inp-onboarding-birthdate" placeholder="YYYY-MM-DD" pattern="\d{4}-\d{2}-\d{2}"
            inputmode="numeric" required autocomplete="off">
          <div class="picker-container">
            <span>📅</span>
            <input type="date" tabindex="-1"
              onchange="document.getElementById('inp-onboarding-birthdate').value = this.value">
          </div>
        </div>
      </div>

      <button class="btn-primary" id="btn-start-onboarding" style="width:100%;">開始旅程</button>
    </div>
  </div>



  <!-- Time Capsule Modal -->
  <div class="modal-overlay" id="modal-time-capsule" style="z-index: 1000;">
    <div class="modal-content time-capsule-content" style="text-align:center; padding: 40px 20px; position:relative;">
      <span
        style="position:absolute; top:15px; right:20px; font-size:1.5rem; cursor:pointer; color:var(--ink-secondary);"
        id="btn-close-time-capsule">&times;</span>

      <div id="time-capsule-subtitle"
        style="color: var(--accent-gold); font-size: 0.9rem; font-weight: 600; letter-spacing: 2px; margin-bottom: 10px;">
        歲 月 流 轉</div>
      <h2 id="time-capsule-title"
        style="margin-top: 0; margin-bottom: 20px; font-family: var(--font-heading); font-size: 1.8rem;">歷史上的今天</h2>

      <div id="time-capsule-card" class="event-card"
        style="text-align: left; margin: 0 auto; max-width: 100%; border-radius: 12px; padding: 25px;">
        <!-- Card Content generated by JS -->
      </div>

      <button class="btn-secondary" id="btn-time-capsule-next"
        style="margin-top: 30px; border-radius: 20px; padding: 10px 24px;">✨ 進入下一個時空</button>
    </div>
  </div>

  <script src="app.js"></script>

</body>

</html>
